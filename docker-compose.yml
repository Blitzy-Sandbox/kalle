# =============================================================================
# Kalle — WhatsApp Clone · Full Stack Docker Compose
# =============================================================================
# Usage:
#   cp .env.example .env
#   docker compose up
#
# All 7 services run locally with zero external dependencies (R38).
# Hot reload enabled for frontend, backend, and worker via volume mounts (R40).
# Migrations run automatically on API startup (R39).
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 16 — Primary Database
  # ---------------------------------------------------------------------------
  # Stores all persistent application data: users, conversations, messages,
  # stories, media metadata, encryption key bundles, audit logs, and sessions.
  # WAL settings enable point-in-time recovery and replication readiness.
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: kalle-postgres
    restart: unless-stopped
    ports:
      - "${PGPORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${PGUSER:-kalle}
      POSTGRES_PASSWORD: ${PGPASSWORD:-kalle_dev_password}
      POSTGRES_DB: ${PGDATABASE:-kalle_db}
      # Non-superuser application role — created by init-db.sh on first boot.
      # Used by API and worker services for runtime DB access (R32 enforcement).
      APP_DB_USER: ${APP_DB_USER:-kalle_app}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD:-kalle_app_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Init script creates non-superuser app role on first DB initialization.
      # Only runs when data directory is empty (first boot).
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    command:
      - postgres
      - -c
      - wal_level=replica
      - -c
      - max_wal_senders=3
      - -c
      - max_replication_slots=3
      - -c
      - wal_keep_size=256MB
      - -c
      - shared_preload_libraries=pg_stat_statements
      - -c
      - log_statement=mod
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${PGUSER:-kalle} -d ${PGDATABASE:-kalle_db}
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Redis 7 — Cache, Pub/Sub, Session Store, BullMQ Broker
  # ---------------------------------------------------------------------------
  # Serves multiple roles: Socket.IO Redis adapter for horizontal scaling,
  # JWT token blacklist for session revocation, BullMQ job broker,
  # presence/typing indicator cache, and general application cache.
  # Append-only file (AOF) persistence enabled for data durability.
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: kalle-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory-policy noeviction
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Keycloak 24 — OAuth 2.0 / OIDC Identity Provider for V2 Auth (FR-1, FR-11)
  # ---------------------------------------------------------------------------
  # Acts as the OAuth Authorization Server backing the V2 auth path. Bootstraps
  # the `blitzy` realm via --import-realm using the realm export bind-mounted
  # from packages/auth/keycloak/realm-export.json (one directory above kalle/).
  #
  # Per AAP Section 0.5.1.4 (Group 4) and Section 0.4.1.6 (sequence diagram),
  # this service is required for:
  #   * Kalle PKCE login redirect (FR-8)
  #   * Cross-app SSO audience chain (FR-11) — issues tokens carrying both
  #     "kalle-app" AND "odoo-app" in the aud claim when odoo:basic/odoo:admin
  #     scopes are requested.
  #   * Backchannel logout token push to the auth sidecar.
  #
  # Operational hardening (resolves QA C1 findings):
  #   * --health-enabled=true exposes /health/{live,ready,started} on :8080
  #     for the docker-compose healthcheck below (Issue 5).
  #   * --log-console-output=json emits structured JSON log lines to satisfy
  #     the Observability rule (Issue 6).
  #   * Healthcheck uses bash's built-in /dev/tcp instead of curl/wget because
  #     the keycloak:24.0 image (UBI 9 minimal) does NOT ship curl or wget.
  #     Bash 5.1 is available at /bin/sh -> bash, supporting /dev/tcp natively.
  # ---------------------------------------------------------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: kalle-keycloak
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # Master-realm admin credentials for bootstrapping the blitzy realm and
      # for seed-admin.ts to call the Admin REST API. Defaults are for local
      # dev only; production deployments MUST override via .env (R8 spirit —
      # though placeholders here are sourced from environment, never committed).
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      # Enables the Quarkus health extension so /health/ready returns 200/503
      # instead of 404. Required for the healthcheck below to function.
      KC_HEALTH_ENABLED: "true"
      # Switches Quarkus log handler from human-readable text to structured JSON
      # output. Satisfies User-Specified Observability rule.
      KC_LOG_CONSOLE_OUTPUT: "json"
    command:
      - start-dev
      - --import-realm
      - --health-enabled=true
      - --log-console-output=json
    volumes:
      # Bind-mount ONLY the realm-export.json file into Keycloak's import
      # directory (NOT the entire packages/auth/keycloak/ directory). Keycloak's
      # --import-realm flag scans /opt/keycloak/data/import for ALL *.json
      # files; the sibling google-broker-flow.json is a standalone documentation
      # artifact (per its own $schema-comment) and is NOT a valid
      # RealmRepresentation, so mounting it would cause Keycloak to fail
      # startup with an UnrecognizedPropertyException. The single-file mount
      # keeps the documentation file in the source tree while ensuring only
      # the realm export reaches Keycloak's importer.
      - ../packages/auth/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    healthcheck:
      # Uses bash /dev/tcp because curl and wget are NOT installed in the
      # quay.io/keycloak/keycloak:24.0 image (verified 2026-04-27). Sends a
      # raw HTTP GET to /health/ready and asserts that the first response
      # line contains "200" (HTTP/1.0 200 OK).
      test:
        - CMD-SHELL
        - "exec 3<>/dev/tcp/localhost/8080 && printf 'GET /health/ready HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && head -n 1 <&3 | grep -q '200' || exit 1"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  # ---------------------------------------------------------------------------
  # Express API + Socket.IO Backend (port 3001)
  # ---------------------------------------------------------------------------
  # Composition root wiring all domain services, repositories, and providers.
  # Runs Prisma migrations on startup, then starts the dev server with tsx
  # for TypeScript hot reload. Serves both REST API (/api/v1/*) and WebSocket
  # connections via Socket.IO with Redis adapter.
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
      target: builder
    container_name: kalle-api
    restart: unless-stopped
    ports:
      - "${PORT:-3001}:${PORT:-3001}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      # Application DATABASE_URL uses the non-superuser kalle_app role (R32).
      # This role has UPDATE/DELETE revoked on audit_logs for immutability.
      DATABASE_URL: postgresql://${APP_DB_USER:-kalle_app}:${APP_DB_PASSWORD:-kalle_app_password}@postgres:${PGPORT:-5432}/${PGDATABASE:-kalle_db}?schema=public
      # Superuser URL for running Prisma migrations and applying permission grants.
      # Migrations require DDL privileges that the app role does not have.
      MIGRATION_DATABASE_URL: postgresql://${PGUSER:-kalle}:${PGPASSWORD:-kalle_dev_password}@postgres:${PGPORT:-5432}/${PGDATABASE:-kalle_db}?schema=public
      REDIS_URL: redis://redis:6379
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      UPLOAD_DIR: /app/uploads
    volumes:
      # Dev hot reload mounts (R40)
      - ./apps/api/src:/app/apps/api/src
      - ./packages/shared/src:/app/packages/shared/src
      - ./prisma:/app/prisma
      # Mount scripts for post-migration SQL grants
      - ./scripts:/app/scripts
      # Named volume for encrypted media uploads
      - uploads:/app/uploads
    command:
      - sh
      - -c
      - |
        npx prisma generate &&
        (DATABASE_URL="$$MIGRATION_DATABASE_URL" npx prisma migrate deploy || true) &&
        (DATABASE_URL="$$MIGRATION_DATABASE_URL" npx prisma db execute --file ./scripts/post-migrate.sql --schema ./prisma/schema.prisma 2>/dev/null || true) &&
        if [ "$${SEED_ON_INIT:-false}" = "true" ]; then echo "--- Seeding Database ---" && (DATABASE_URL="$$MIGRATION_DATABASE_URL" npx prisma db seed || true) && echo "Seed step complete!"; fi &&
        exec npx tsx watch apps/api/src/server.ts
    healthcheck:
      test:
        - CMD-SHELL
        - wget --no-verbose --tries=1 --spider http://localhost:${PORT:-3001}/api/v1/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ---------------------------------------------------------------------------
  # Next.js 14 Frontend (port 3000)
  # ---------------------------------------------------------------------------
  # App Router frontend with Tailwind CSS, Zustand state management,
  # Socket.IO client for real-time events, Signal Protocol encryption,
  # and Dexie.js IndexedDB for client-side search.
  # Public environment variables are inlined at dev server startup.
  # ---------------------------------------------------------------------------
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      target: builder
    container_name: kalle-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    environment:
      # Public vars accessed from the browser — use localhost, not Docker hostname
      NEXT_PUBLIC_API_URL: http://localhost:${PORT:-3001}
      NEXT_PUBLIC_WS_URL: http://localhost:${PORT:-3001}
      NODE_ENV: development
    volumes:
      # Dev hot reload mounts (R40)
      - ./apps/web/src:/app/apps/web/src
      - ./apps/web/public:/app/apps/web/public
    command: npm run dev --workspace=apps/web
    healthcheck:
      test:
        - CMD-SHELL
        - wget --no-verbose --tries=1 --spider http://localhost:3000 || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

  # ---------------------------------------------------------------------------
  # BullMQ Worker — Async Job Processing
  # ---------------------------------------------------------------------------
  # Processes background jobs: group message fan-out, Sender Key distribution,
  # link preview extraction, expired story cleanup, audit log purge, and
  # prekey replenishment notifications. Connects to Redis as job broker
  # and PostgreSQL for data persistence.
  # ---------------------------------------------------------------------------
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
      target: builder
    container_name: kalle-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      # Application DATABASE_URL uses the non-superuser kalle_app role (R32).
      # Worker only needs runtime access — no migration privileges required.
      DATABASE_URL: postgresql://${APP_DB_USER:-kalle_app}:${APP_DB_PASSWORD:-kalle_app_password}@postgres:${PGPORT:-5432}/${PGDATABASE:-kalle_db}?schema=public
      REDIS_URL: redis://redis:6379
    volumes:
      # Dev hot reload mounts (R40)
      - ./workers/queue/src:/app/workers/queue/src
      - ./packages/shared/src:/app/packages/shared/src
    command: npx tsx watch workers/queue/src/index.ts
    healthcheck:
      test:
        - CMD-SHELL
        - ps aux | grep -q '[t]sx.*workers' || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ---------------------------------------------------------------------------
  # PostgreSQL Backup Service — Daily pg_dump with 7-day retention (R36)
  # ---------------------------------------------------------------------------
  # Runs crond in foreground with a daily 2 AM cron job executing pg_dump
  # to produce gzip-compressed SQL archives in /backups. Archives older
  # than BACKUP_RETENTION_DAYS are automatically purged after each backup.
  # ---------------------------------------------------------------------------
  backup:
    build:
      context: .
      dockerfile: Dockerfile.backup
    container_name: kalle-backup
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGPORT: "5432"
      # Backup uses the superuser role — pg_dump needs full read access to all tables
      PGUSER: ${PGUSER:-kalle}
      PGPASSWORD: ${PGPASSWORD:-kalle_dev_password}
      PGDATABASE: ${PGDATABASE:-kalle_db}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
    volumes:
      - ./backups:/backups
    healthcheck:
      test:
        - CMD-SHELL
        - kill -0 1 2>/dev/null || exit 1
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ---------------------------------------------------------------------------
  # OpenTelemetry Collector — Metrics Pipeline (R37)
  # ---------------------------------------------------------------------------
  # Receives OTLP metrics from the backend API via gRPC (port 4317),
  # batches them, and exposes a Prometheus-compatible scrape endpoint
  # on port 8889. Metrics include HTTP request count/latency, WebSocket
  # connection count, BullMQ queue depth, and DB query latency percentiles.
  # ---------------------------------------------------------------------------
  otel-collector:
    image: otel/opentelemetry-collector:latest
    container_name: kalle-otel-collector
    restart: unless-stopped
    ports:
      - "4317:4317"   # gRPC OTLP receiver
      - "4318:4318"   # HTTP  OTLP receiver (used by API's OTLPMetricExporter)
      - "8889:8889"   # Prometheus metrics exporter
    volumes:
      - ./otel-collector-config.yml:/etc/otelcol/config.yaml:ro
    healthcheck:
      # The OTel Collector base image is scratch-based (no shell, wget, or curl).
      # We use the built-in validate subcommand to confirm the binary and config
      # are operational. CMD (not CMD-SHELL) avoids requiring /bin/sh.
      test:
        - CMD
        - /otelcol
        - validate
        - --config
        - /etc/otelcol/config.yaml
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

# =============================================================================
# Named Volumes — Persistent data across container restarts
# =============================================================================
volumes:
  # PostgreSQL data directory — survives container rebuilds
  postgres_data:
    driver: local
  # Redis AOF persistence — survives container rebuilds
  redis_data:
    driver: local
  # Encrypted media file uploads — shared between API and potential CDN
  uploads:
    driver: local
